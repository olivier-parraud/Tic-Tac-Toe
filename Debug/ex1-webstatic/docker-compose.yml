# Exercice 1 - WebStatic
# Lance ce projet avec : docker compose up
# Le conteneur demarre sans erreur mais http://localhost:8080 reste injoignable.

services:
  web:
    image: nginx:alpine
    container_name: webstatic
    ports:
      - "8080:80"
    volumes:
      - ./site:/usr/share/nginx/html:ro
    restart: unless-stopped
