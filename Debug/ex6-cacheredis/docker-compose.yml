# Exercice 6 - CacheRedis
# Lance ce projet avec : docker compose up
# Docker Compose renvoie une erreur : le volume utilise n'est pas declare.

services:
  cache:
    image: redis:7-alpine
    container_name: cache_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  redis_data:
